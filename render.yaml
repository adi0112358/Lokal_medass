services:
  - type: web
    name: lokal-medassist-backend
    runtime: node
    plan: free
    rootDir: services/patient_backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: JWT_SECRET
        sync: false
      - key: DATA_DIR
        value: /tmp/lokal-medassist-data
